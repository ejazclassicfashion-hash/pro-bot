services:
  - type: web
    name: pro-bot
    runtime: python
    region: frankfurt          # NON-US region — avoids Binance geo-block
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 300
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: EXCHANGE
        value: binance          # auto-fallback if blocked anyway
